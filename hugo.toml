baseURL = 'https://www.dailyremu.com/'
languageCode = 'ko-KR'
defaultContentLanguage = 'ko'
title = 'dailyremu - 부동산·주식 투자 인사이트'
theme = 'hugo-theme-stack'
enableRobotsTXT = true
paginate = 10

[params]
  description = "서울 부동산 시세, 재건축, GTX 교통호재, 주식 투자 전략까지. 매일 아침 데이터 기반 투자 인사이트를 전합니다."
  mainSections = ["posts"]
  favicon = "/favicon.svg"
  rssFullContent = true

  [params.sidebar]
    emoji = ""
    subtitle = "매일 아침, 부동산 인사이트"
    compact = false

  [params.article]
    math = false
    toc = true
    readingTime = true
    headingAnchor = false
    [params.article.list]
      showTags = true

  [params.footer]
    since = 2021
    customText = ""

  [[params.widgets.homepage]]
    type = "search"
  [[params.widgets.homepage]]
    type = "categories"
  [[params.widgets.homepage]]
    type = "tag-cloud"
    [params.widgets.homepage.params]
      limit = 20
  [[params.widgets.page]]
    type = "toc"
  [[params.widgets.page]]
    type = "categories"

  [params.defaultImage]
    opengraph = ["featured", "cover", "thumbnail"]

  [params.opengraph]
    [params.opengraph.twitter]
      card = "summary_large_image"

  [params.colorScheme]
    toggle = true
    default = "auto"

[params.author]
  name = "dailyremu"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      strikethrough = false
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80

[menu]
  [[menu.main]]
    identifier = "home"
    name = "홈"
    url = "/"
    weight = 1
    [menu.main.params]
      icon = "home"
  [[menu.main]]
    identifier = "categories"
    name = "카테고리"
    url = "/categories/"
    weight = 2
    [menu.main.params]
      icon = "categories"
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 3
    [menu.main.params]
      icon = "tag"
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/page/search/"
    weight = 4
    [menu.main.params]
      icon = "search"
