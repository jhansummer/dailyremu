{{ define "main" }}
<script>
(function(){
  var defined_redirects = {{ readFile "static/redirects.json" | safeJS }};
  var params = new URLSearchParams(window.location.search);
  var pid = params.get('p') || params.get('page_id');
  if (pid && defined_redirects[pid]) {
    window.location.replace(defined_redirects[pid]);
  }
})();
</script>
<div style="text-align: center; padding: 80px 20px; max-width: 500px; margin: 0 auto;">
    <div style="font-size: 6rem; font-weight: 800; color: var(--accent-color); line-height: 1;">404</div>
    <h1 style="font-size: 1.5rem; margin-top: 16px; color: var(--card-text-color-main);">페이지를 찾을 수 없습니다</h1>
    <p style="color: var(--card-text-color-secondary); margin-top: 8px; font-size: 1.1rem;">요청하신 페이지가 이전되었거나 존재하지 않습니다.</p>
    <div style="margin-top: 32px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
        <a href="/" style="display: inline-block; padding: 14px 28px; background: var(--accent-color); color: #fff; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(37,99,235,0.3);">홈으로 이동</a>
        <a href="/page/search/" style="display: inline-block; padding: 14px 28px; background: var(--card-background); color: var(--card-text-color-main); border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1.05rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">검색하기</a>
    </div>
    <div style="margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--card-separator-color);">
        <p style="color: var(--card-text-color-tertiary); font-size: 0.95rem;">최근 글</p>
    </div>
</div>
{{ end }}
